{% extends 'base.html' %} {% block content %}

<div class="col-md-5 m-auto">
  <h3 style="text-align: center">
    <br />
    Editar jogo
  </h3>

  <form action="{{ url_for('editar_jogos', id=game.id) }}" method="POST">
    <input
      type="text"
      name="titulo"
      class="form-control mb-2"
      value="{{ game.titulo }}"
      required
    />

    <input
      type="number"
      name="ano"
      class="form-control mb-2"
      value="{{ game.ano }}"
      required
    />

    <input
      type="text"
      name="categoria"
      class="form-control mb-2"
      value="{{ game.categoria }}"
      required
    />

    <input
      type="text"
      name="plataforma"
      class="form-control mb-2"
      value="{{ game.plataforma }}"
      required
    />

    <input
      type="number"
      step="0.01"
      name="preco"
      class="form-control mb-2"
      value="{{ game.preco }}"
      required
    />

    <input
      type="number"
      name="quantidade"
      class="form-control mb-3"
      value="{{ game.quantidade }}"
      required
    />

    <input type="submit" value="Salvar Alterações" class="btn btn-warning" />

    <input type="reset" value="Limpar" class="btn btn-danger" />
  </form>
</div>

{% endblock content %}
